<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wrapper">
        <!-- Game canvas — width/height set dynamically by config.js -->
        <canvas id="canvas"></canvas>

        <!-- Size-picker buttons injected by main.js -->
        <div class="size-bar" id="size-bar"></div>
    </div>

    <!--
        Script load order matters — each file relies on globals
        defined in the files before it:
          config  →  assets  →  game  →  render  →  main
    -->
    <script src="js/config.js"></script>
    <script src="js/assets.js"></script>
    <script src="js/game.js"></script>
    <script src="js/render.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
