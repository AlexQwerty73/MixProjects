<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mix — Projects</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --nav-h: 52px;
            --bg: #404045;
            --nav-bg: #111115;
            --border: rgba(255, 255, 255, 0.07);
            --text: #c8c8d0;
            --text-dim: #44444e;
            --accent: #5b6aff;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        /* ── NAV ── */
        nav {
            height: var(--nav-h);
            background: var(--nav-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 0;
            position: relative;
            z-index: 10;
            /* Фиксируем высоту, не даём сжаться */
            flex-shrink: 0;
        }

        .nav-logo {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.18em;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            margin-right: 16px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* Прокручиваемая полоска вкладок */
        .tabs-scroll {
            display: flex;
            align-items: center;
            gap: 2px;
            overflow-x: auto;
            overflow-y: hidden;
            flex: 1;
            /* Скрываем скроллбар */
            scrollbar-width: none;
        }

        .tabs-scroll::-webkit-scrollbar {
            display: none;
        }

        .tab {
            height: 34px;
            padding: 0 14px;
            border: 1px solid transparent;
            border-radius: 7px;
            background: transparent;
            color: var(--text-dim);
            font-size: 12.5px;
            font-family: inherit;
            cursor: pointer;
            transition: color .18s, background .18s, border-color .18s;
            display: flex;
            align-items: center;
            gap: 7px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .tab:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.05);
        }

        .tab.active {
            color: #fff;
            background: rgba(91, 106, 255, 0.13);
            border-color: rgba(91, 106, 255, 0.38);
        }

        .tab .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.4;
            transition: opacity .18s;
            flex-shrink: 0;
        }

        .tab.active .dot {
            opacity: 1;
            background: var(--accent);
        }

        /* ── STAGE ── */
        .stage {
            position: relative;
            /* Точно оставшаяся высота */
            height: calc(100vh - var(--nav-h));
            overflow: hidden;
        }

        /* Empty state */
        .empty {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            pointer-events: none;
        }

        .empty-dots {
            display: grid;
            grid-template-columns: repeat(3, 14px);
            gap: 5px;
            opacity: 0.1;
            margin-bottom: 2px;
        }

        .empty-dots span {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            background: #fff;
        }

        .empty p {
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: .04em;
        }

        /* iframes */
        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            pointer-events: none;
            transition: opacity .22s ease;
        }

        iframe.active {
            opacity: 1;
            pointer-events: all;
        }
    </style>
</head>

<body>

    <nav>
        <span class="nav-logo">Mix</span>
        <div class="tabs-scroll" id="tabs"></div>
    </nav>

    <div class="stage" id="stage">
        <div class="empty" id="empty">
            <div class="empty-dots">
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
            </div>
            <p>Choose project</p>
        </div>
    </div>

    <script>

        const PROJECTS = [
            { name: 'Parallax', src: './ParallaxEffect/index.html' },
            { name: 'Loader', src: './rainbowBlocks/index.html' },
            { name: 'Orbit', src: './cycle/index.html' },
            { name: 'Some Jar', src: './specialJar/index.html' },
            { name: 'Cube', src: './cubeRotate/index.html' },
            { name: 'Infinity', src: './Infinity/index.html' },
            { name: 'Projects', src: './newpoj/index.html' },
            { name: 'RPS', src: './RockPaperScissors/index.html' },
            { name: 'FlappyB', src: './flappy_bird/index.html' },
            { name: 'M', src: './matrica/index.html' },
            // { name: 'T', src: './tankGame/main.html' },
        ];

        /* ─────────────────────────────────────────────────────*/

        const tabsEl = document.getElementById('tabs');
        const stageEl = document.getElementById('stage');
        const emptyEl = document.getElementById('empty');
        let current = null;

        PROJECTS.forEach((proj, i) => {
            const btn = document.createElement('button');
            btn.className = 'tab';
            btn.innerHTML = `<span class="dot"></span>${proj.name}`;
            btn.onclick = () => show(i);
            tabsEl.appendChild(btn);

            const frame = document.createElement('iframe');
            frame.dataset.src = proj.src;
            frame.id = `f${i}`;
            stageEl.appendChild(frame);
        });

        function show(index) {
            if (current === index) return;
            current = index;

            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
            emptyEl.style.display = 'none';

            const btn = tabsEl.children[index];
            const frame = document.getElementById(`f${index}`);

            btn.classList.add('active');
            // Прокручиваем к выбранной вкладке если она вне видимости
            btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });

            if (!frame.src || frame.src === window.location.href) {
                frame.src = frame.dataset.src;
            }
            frame.classList.add('active');
        }

        show(0);
    </script>

</body>

</html>
